{% extends "base.html" %}

{% block title %}Login - Telegram Stremio{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-160px)] py-12 px-4 sm:px-6 lg:px-8 relative">
    
    <div class="max-w-md w-full space-y-8 relative z-10">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="text-center relative z-10">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center mx-auto mb-5 border border-white/10 shadow-lg shadow-purple-500/10">
                <i class="fas fa-lock text-2xl text-purple-400"></i>
            </div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight">Admin Login</h2>
            <p class="mt-2 text-gray-400 font-medium">Sign in to access the admin dashboard</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-5 py-3.5 rounded-xl flex items-center gap-3 shadow-lg shadow-red-500/5 backdrop-blur-sm animate-[slideDown_0.3s_ease-out]">
            <i class="fas fa-exclamation-circle text-lg shrink-0"></i>
            <span class="text-sm font-semibold">{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" class="glass-panel p-8 sm:p-10 rounded-2xl shadow-2xl space-y-6 relative overflow-hidden border border-white/10">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-500/20 rounded-full blur-[60px] pointer-events-none"></div>

            <div class="relative z-10">
                <label for="username" class="block text-sm font-semibold text-gray-300 mb-2">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-purple-400 text-gray-500">
                        <i class="fas fa-user"></i>
                    </div>
                    <input type="text" id="username" name="username" required placeholder="Enter your username"
                        class="w-full glass-input rounded-xl pl-11 pr-4 py-3 text-sm placeholder-gray-500 focus:ring-2 focus:ring-purple-500/30 transition-all">
                </div>
            </div>

            <div class="relative z-10">
                <label for="password" class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-purple-400 text-gray-500">
                        <i class="fas fa-key"></i>
                    </div>
                    <input type="password" id="password" name="password" required placeholder="Enter your password"
                        class="w-full glass-input rounded-xl pl-11 pr-4 py-3 text-sm placeholder-gray-500 focus:ring-2 focus:ring-purple-500/30 transition-all">
                </div>
            </div>

            <div class="pt-2 relative z-10">
                <button type="submit"
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-3.5 px-4 rounded-xl transition-all duration-200 font-bold shadow-lg shadow-blue-500/20 border border-blue-400/30 flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-[0.98]">
                    <span>Secure Sign In</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </div>
        </form>

        <div class="text-center relative z-10 mt-8">
            <p class="text-gray-500 text-sm font-medium flex flex-wrap items-center justify-center gap-4">
                <a href="/status" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1.5 px-2 py-1 rounded-lg hover:bg-white/5">
                    <i class="fas fa-server"></i> System Status
                </a>
                <span class="text-white/10 hidden sm:inline">•</span>
                <a href="/stremio" class="text-purple-400 hover:text-purple-300 transition-colors flex items-center gap-1.5 px-2 py-1 rounded-lg hover:bg-white/5">
                    <i class="fas fa-book"></i> Stremio Guide
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
